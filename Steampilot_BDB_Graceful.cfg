// Steampilot - BlueDog partial install compatibility
// If BlueDog parts exist, remove B9 subtype upgrade requirements that can
// point to missing upgrade definitions in trimmed installs.

@PART[bluedog_*]:HAS[@MODULE[ModuleB9PartSwitch]]:NEEDS[Bluedog_DB,B9PartSwitch]:AFTER[Bluedog_DB]
{
    @MODULE[ModuleB9PartSwitch],*
    {
        @SUBTYPE,*
        {
            !upgradeRequired = DELETE
        }
    }
}
