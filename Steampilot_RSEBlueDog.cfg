// Steampilot
// Revoice stock engines/SRBs with BlueDog sound assets copied into RSE default.
// Keep this in its own mod folder so it is easy to find in GameData.

@PART[LiquidEngineLV-T91,radialLiquidEngine1-2,liquidEngine3_v2,LiquidEngineRV-1,liquidEngineMini_v2,omsEngine,smallRadialEngine_v2,microEngine_v2,radialEngineMini_v2,LiquidEngineLV-TX87,LiquidEngineRE-J10,LiquidEngineRE-I2,LiquidEngineRK-7,liquidEngine2-2_v2,liquidEngine,liquidEngine_v2,liquidEngine2,liquidEngine2_v2,toroidalAerospike,Size3EngineCluster,Size2LFB,Size2LFB_v2,Size3AdvancedEngine,liquidEngineMainsail_v2,LiquidEngineKE-1,SSME,engineLargeSkipper_v2]:HAS[@MODULE[RSE_Engines]]:AFTER[zzRocketSoundEnhancementDefault]
{
    @MODULE[RSE_Engines]
    {
        @SOUNDLAYERGROUP,*
        {
            @SOUNDLAYER[ThrustHigh]
            {
                !audioClip,* {}
                audioClip = Steampilot/Sounds/BlueDog/KatSounds/kero_loop_hard
            }
            @SOUNDLAYER[ThrustLow]
            {
                !audioClip,* {}
                audioClip = Steampilot/Sounds/BlueDog/KW/sound_liq4
            }
        }

        @Burst
        {
            @SOUNDLAYER[Bursts]
            {
                !audioClip,* {}
                audioClip = Steampilot/Sounds/BlueDog/KatSounds/kero_loop_spicy
            }
        }

        @Engage
        {
            @SOUNDLAYER[Engage]
            {
                !audioClip,* {}
                audioClip = Steampilot/Sounds/BlueDog/KW/sound_sps
            }
        }

        @Flameout
        {
            @SOUNDLAYER[Flameouts]
            {
                !audioClip,* {}
                audioClip = Steampilot/Sounds/BlueDog/KatSounds/kero_flameout_hard
                audioClip = Steampilot/Sounds/BlueDog/KatSounds/kero_flameout_spicy
            }
        }
    }
}

