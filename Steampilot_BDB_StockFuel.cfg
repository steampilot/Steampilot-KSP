// Steampilot - BlueDog engines on stock fuel
// Converts BlueDog liquid engines to LiquidFuel + Oxidizer without editing BlueDog_DB files.

@PART[bluedog_*]:HAS[@MODULE[ModuleEngines*]]:NEEDS[Bluedog_DB]:AFTER[Bluedog_DB]
{
    @MODULE[ModuleEngines*]:HAS[!PROPELLANT[SolidFuel],!PROPELLANT[IntakeAir]],*
    {
        !PROPELLANT,* {}

        PROPELLANT
        {
            name = LiquidFuel
            ratio = 0.9
            DrawGauge = True
        }
        PROPELLANT
        {
            name = Oxidizer
            ratio = 1.1
        }
    }
}
