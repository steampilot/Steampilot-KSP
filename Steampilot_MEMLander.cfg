// Steampilot - MEM Lander tweaks
// Patches the stock MEMLander without touching SquadExpansion files.

@PART[MEMLander]:NEEDS[SquadExpansion/MakingHistory]
{
	// Scale up 50%
	rescaleFactor = 1.5

	// Promote top attachment node to size 2 (matches larger scale)
	@node_stack_top = 0.0, 1.338, 0, 0.0, 1.0, 0.0, 2

	// Shift center of mass upward to match rescaled geometry
	CoMOffset = 0.0, 1.0, 0.0

	// Keep the structural module but point it to a non-existent transform,
	// so the skirt mesh is never rendered.
	@MODULE[ModuleStructuralNode]
	{
		@rootObject = Steampilot_NoSkirt
	}
}
